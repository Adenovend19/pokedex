<div class="modal-overlay" (click)="close.emit()">
    <div class="modal-content" (click)="$event.stopPropagation()">
        <button class="close-btn" (click)="close.emit()">&times;</button>

        <div class="modal-scroll-area">
            <div class="modal-header">
                <div class="pokemon-image">
                    <img [src]="pokemon.image" [alt]="pokemon.name">
                </div>
                <div class="header-info">
                    <span class="id-badge">{{ pokemon.displayId }}</span>
                    <h2>{{ pokemon.name }}</h2>
                    <div class="types">
                        <span *ngFor="let type of pokemon.types" class="type-badge" [ngClass]="type">
                            {{ type }}
                        </span>
                    </div>
                </div>
            </div>

            <div class="modal-body">
                <div class="info-section">
                    <h3>Physical Stats</h3>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <span class="label">Weight</span>
                            <span class="value">{{ pokemon.weight / 10 }} kg</span>
                        </div>
                        <div class="stat-item">
                            <span class="label">Height</span>
                            <span class="value">{{ pokemon.height / 10 }} m</span>
                        </div>
                    </div>
                </div>

                <div class="info-section">
                    <h3>Abilities</h3>
                    <div class="tag-container">
                        <span *ngFor="let ability of pokemon.abilities" class="tag ability">
                            {{ ability }}
                        </span>
                    </div>
                </div>

                <div class="info-section">
                    <h3>Top Moves</h3>
                    <div class="tag-container">
                        <span *ngFor="let move of pokemon.moves" class="tag move">
                            {{ move }}
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
