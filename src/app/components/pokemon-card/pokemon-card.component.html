<div class="pokemon-card" (click)="cardClick.emit(pokemon)" [ngClass]="pokemon.types[0]">
    <div class="pokemon-id">{{ pokemon.displayId }}</div>
    <div class="pokemon-image">
        <img [src]="pokemon.image" [alt]="pokemon.name" loading="lazy">
    </div>
    <div class="pokemon-info">
        <h3 class="pokemon-name">{{ pokemon.name }}</h3>
        <div class="pokemon-types">
            <span *ngFor="let type of pokemon.types" class="type-badge" [ngClass]="type">
                {{ type }}
            </span>
        </div>
        <div class="pokemon-stats">
            <span><strong>Weight:</strong> <br> {{ pokemon.weight / 10 }}kg</span>
            <span><strong>Height:</strong> <br> {{ pokemon.height / 10 }}m</span>
        </div>
    </div>
</div>
